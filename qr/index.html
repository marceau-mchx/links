<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code SVG Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f8f8f8; color: #222; }
  h1 { font-size: 1.3em; margin-bottom: 20px; }
  label { display: block; margin-bottom: 4px; font-weight: bold; }
  input[type=text], select { width: 100%; padding: 8px; font-family: monospace; font-size: 14px; border: 1px solid #ccc; margin-bottom: 12px; }
  .row { display: flex; gap: 12px; align-items: end; }
  .row > div { flex: 1; }
  button { padding: 10px 20px; font-family: monospace; font-size: 14px; cursor: pointer; border: 1px solid #333; background: #333; color: #fff; }
  button:hover { background: #555; }
  button.secondary { background: #fff; color: #333; }
  button.secondary:hover { background: #eee; }
  .buttons { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  #output { margin-top: 24px; text-align: center; }
  #output svg { background: #fff; padding: 16px; border: 1px solid #ddd; }
  .info { margin-top: 8px; font-size: 12px; color: #666; }
  #error { color: #c00; margin-top: 8px; }
  .note { margin-top: 4px; font-size: 11px; color: #999; }
  .checkbox-row { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
  .checkbox-row input { margin: 0; }
  .checkbox-row label { margin: 0; font-weight: normal; }
  .mirror-warn { color: #c60; font-size: 12px; margin-top: -8px; margin-bottom: 12px; }
</style>
</head>
<body>
<h1>QR Code SVG Generator</h1>

<label for="text">URL / Texte</label>
<input type="text" id="text" value="https://marceau-mchx.github.io/links/master/power_board_revB" placeholder="https://...">

<div class="row">
  <div>
    <label for="ecl">Correction d'erreur</label>
    <select id="ecl">
      <option value="L">L &#8212; 7%</option>
      <option value="M" selected>M &#8212; 15%</option>
      <option value="Q">Q &#8212; 25%</option>
      <option value="H">H &#8212; 30%</option>
    </select>
  </div>
  <div>
    <label for="size">Taille SVG (mm)</label>
    <input type="text" id="size" value="10">
  </div>
</div>

<div class="checkbox-row">
  <input type="checkbox" id="mirror" onchange="generate()">
  <label for="mirror">Miroir horizontal (face B / back silkscreen)</label>
</div>
<div class="mirror-warn" id="mirrorWarn" style="display:none;">&#9888; Preview miroir&#233;e &#8212; le SVG export&#233; sera invers&#233; pour impression face arri&#232;re.</div>

<button onclick="generate()">G&#233;n&#233;rer</button>
<div id="error"></div>

<div id="output"></div>
<div class="buttons" id="btns" style="display:none;">
  <button class="secondary" onclick="downloadSVG()">T&#233;l&#233;charger .svg (KiCad)</button>
  <button class="secondary" onclick="copySVG()">Copier SVG</button>
</div>
<div class="note" id="note" style="display:none;">SVG sans fond blanc &#8212; uniquement les modules noirs. Compatible import KiCad.</div>
<div class="info" id="info"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
function getGrid(text, ecl) {
  const qr = qrcode(0, ecl);
  qr.addData(text);
  qr.make();
  const count = qr.getModuleCount();
  const grid = [];
  for (let r = 0; r < count; r++) {
    const row = [];
    for (let c = 0; c < count; c++) {
      row.push(qr.isDark(r, c));
    }
    grid.push(row);
  }
  return { grid, modules: count };
}

function mirrorGrid(grid) {
  return grid.map(row => [...row].reverse());
}

// SVG for KiCad: only black rects, no background, units in mm
function gridToSVG(grid, sizeMM) {
  const n = grid.length;
  const quiet = 4;
  const total = n + quiet * 2;
  const modSize = sizeMM / total;

  let rects = '';
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      if (grid[r][c]) {
        const x = ((c + quiet) * modSize).toFixed(4);
        const y = ((r + quiet) * modSize).toFixed(4);
        const s = modSize.toFixed(4);
        rects += `<rect x="${x}" y="${y}" width="${s}" height="${s}"/>\n`;
      }
    }
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${sizeMM} ${sizeMM}" width="${sizeMM}mm" height="${sizeMM}mm">\n<g fill="#000">\n${rects}</g>\n</svg>`;
}

// SVG for browser preview: with white background
function gridToPreviewSVG(grid, sizePx) {
  const n = grid.length;
  const quiet = 4;
  const total = n + quiet * 2;
  const modSize = sizePx / total;

  let rects = '';
  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      if (grid[r][c]) {
        const x = (c + quiet) * modSize;
        const y = (r + quiet) * modSize;
        rects += `<rect x="${x}" y="${y}" width="${modSize}" height="${modSize}"/>`;
      }
    }
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${sizePx} ${sizePx}" width="${sizePx}" height="${sizePx}">
<rect width="100%" height="100%" fill="#fff"/>
<g fill="#000">${rects}</g>
</svg>`;
}

let lastSVG = '';

function generate() {
  const text = document.getElementById('text').value.trim();
  const ecl = document.getElementById('ecl').value;
  const sizeMM = parseFloat(document.getElementById('size').value) || 10;
  const mirror = document.getElementById('mirror').checked;
  const errorEl = document.getElementById('error');
  const outputEl = document.getElementById('output');
  const btnsEl = document.getElementById('btns');
  const noteEl = document.getElementById('note');
  const infoEl = document.getElementById('info');
  const mirrorWarn = document.getElementById('mirrorWarn');

  errorEl.textContent = '';
  outputEl.innerHTML = '';
  btnsEl.style.display = 'none';
  noteEl.style.display = 'none';
  infoEl.textContent = '';
  mirrorWarn.style.display = mirror ? 'block' : 'none';

  if (!text) { errorEl.textContent = 'Entrer une URL ou du texte.'; return; }

  try {
    let { grid, modules } = getGrid(text, ecl);
    if (mirror) grid = mirrorGrid(grid);
    // Preview at 250px
    outputEl.innerHTML = gridToPreviewSVG(grid, 250);
    // KiCad export in mm
    lastSVG = gridToSVG(grid, sizeMM);
    btnsEl.style.display = 'flex';
    noteEl.style.display = 'block';
    const mirrorLabel = mirror ? ' \u2014 MIROIR' : '';
    infoEl.textContent = `${modules}\u00d7${modules} modules \u2014 EC: ${ecl} \u2014 Export: ${sizeMM}mm${mirrorLabel}`;
  } catch (e) {
    errorEl.textContent = e.message;
  }
}

function downloadSVG() {
  const blob = new Blob([lastSVG], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'qrcode.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

function copySVG() {
  navigator.clipboard.writeText(lastSVG).then(() => {
    const btn = document.querySelectorAll('#btns button')[1];
    btn.textContent = 'Copi\u00e9 !';
    setTimeout(() => btn.textContent = 'Copier SVG', 1500);
  });
}

window.addEventListener('load', generate);
</script>
</body>
</html>
